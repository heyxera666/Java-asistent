<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y. — Авторизация</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a0f;
            color: #c0e8ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        .login-card {
            position: relative;
            width: 400px;
            padding: 40px;
            background: rgba(0,20,40,0.85);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0,212,255,0.1);
        }
        .reactor-small {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #00d4ff 30%, rgba(0,80,160,0.4) 60%, transparent 70%);
            box-shadow: 0 0 30px #00d4ff;
            margin: 0 auto 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 20px #00d4ff; }
            50% { box-shadow: 0 0 50px #00d4ff; }
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 20px;
            color: #00d4ff;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .sub { text-align: center; color: #6a8fa8; font-size: 13px; margin-bottom: 30px; letter-spacing: 1px; }
        label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: #6a8fa8;
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,30,60,0.5);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 8px;
            color: #c0e8ff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #00d4ff; box-shadow: 0 0 10px rgba(0,212,255,0.15); }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, rgba(0,100,200,0.4), rgba(0,60,120,0.4));
            border: 1px solid rgba(0,212,255,0.4);
            border-radius: 8px;
            color: #00d4ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        button:hover { background: rgba(0,150,220,0.3); box-shadow: 0 0 20px rgba(0,212,255,0.3); }
        .links { text-align: center; margin-top: 20px; font-size: 13px; }
        .links a { color: #00d4ff; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .error { color: #ff4444; text-align: center; font-size: 13px; margin-bottom: 16px; display: none; }
        .success { color: #00ff88; text-align: center; font-size: 13px; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="reactor-small"></div>
    <h1>F.R.I.D.A.Y.</h1>
    <div class="sub">Идентификация оператора</div>
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <form id="loginForm" action="/login" method="post">
        <label>Email</label>
        <input type="email" name="username" placeholder="operator@stark.com" required>
        <label>Пароль</label>
        <input type="password" name="password" placeholder="••••••••" required>
        <button type="submit">Войти в систему</button>
    </form>
    <div class="links">
        <a href="/register">Регистрация</a> &nbsp;|&nbsp; <a href="/forgot-password">Восстановить доступ</a>
    </div>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    if (params.has('error')) {
        const el = document.getElementById('error');
        el.textContent = 'Неверный email или пароль, босс.';
        el.style.display = 'block';
    }
    if (params.has('logout')) {
        const el = document.getElementById('success');
        el.textContent = 'Выход выполнен. До встречи, босс.';
        el.style.display = 'block';
    }
</script>
</body>
</html>
