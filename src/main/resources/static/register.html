<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y. — Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a0f;
            color: #c0e8ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        .card {
            width: 420px; padding: 40px;
            background: rgba(0,20,40,0.85);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0,212,255,0.1);
        }
        .reactor-small {
            width: 50px; height: 50px; border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #00d4ff 30%, rgba(0,80,160,0.4) 60%, transparent 70%);
            box-shadow: 0 0 30px #00d4ff;
            margin: 0 auto 16px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{box-shadow:0 0 20px #00d4ff;}50%{box-shadow:0 0 50px #00d4ff;} }
        h1 { font-family:'Orbitron',sans-serif; text-align:center; font-size:18px; color:#00d4ff; letter-spacing:3px; margin-bottom:6px; }
        .sub { text-align:center; color:#6a8fa8; font-size:12px; margin-bottom:24px; letter-spacing:1px; }
        label { display:block; font-family:'Orbitron',sans-serif; font-size:10px; color:#6a8fa8; letter-spacing:1px; margin-bottom:5px; text-transform:uppercase; }
        input { width:100%; padding:11px 14px; background:rgba(0,30,60,0.5); border:1px solid rgba(0,212,255,0.2); border-radius:8px; color:#c0e8ff; font-family:'Rajdhani',sans-serif; font-size:15px; margin-bottom:16px; outline:none; transition:border-color 0.3s; }
        input:focus { border-color:#00d4ff; }
        button { width:100%; padding:13px; background:linear-gradient(135deg,rgba(0,100,200,0.4),rgba(0,60,120,0.4)); border:1px solid rgba(0,212,255,0.4); border-radius:8px; color:#00d4ff; font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:2px; cursor:pointer; transition:all 0.3s; text-transform:uppercase; }
        button:hover { background:rgba(0,150,220,0.3); box-shadow:0 0 20px rgba(0,212,255,0.3); }
        .links { text-align:center; margin-top:16px; font-size:13px; }
        .links a { color:#00d4ff; text-decoration:none; }
        .links a:hover { text-decoration:underline; }
        .msg { text-align:center; font-size:13px; margin-bottom:14px; display:none; }
        .msg.error { color:#ff4444; }
        .msg.ok { color:#00ff88; }
    </style>
</head>
<body>
<div class="card">
    <div class="reactor-small"></div>
    <h1>РЕГИСТРАЦИЯ</h1>
    <div class="sub">Создание нового оператора F.R.I.D.A.Y.</div>
    <div class="msg" id="msg"></div>
    <form id="regForm" onsubmit="return register(event)">
        <label>Имя пользователя</label>
        <input type="text" id="username" placeholder="tony_stark" required>
        <label>Email</label>
        <input type="email" id="email" placeholder="boss@stark.com" required>
        <label>Пароль</label>
        <input type="password" id="password" placeholder="Минимум 6 символов" required minlength="6">
        <button type="submit">Создать аккаунт</button>
    </form>
    <div class="links"><a href="/login">← Войти в систему</a></div>
</div>
<script>
async function register(e) {
    e.preventDefault();
    const msg = document.getElementById('msg');
    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });
        const data = await res.json();
        if (data.error) {
            msg.textContent = data.error;
            msg.className = 'msg error';
        } else {
            msg.textContent = 'Аккаунт создан, босс! Перенаправляю...';
            msg.className = 'msg ok';
            setTimeout(() => window.location.href = '/login', 1500);
        }
        msg.style.display = 'block';
    } catch(err) {
        msg.textContent = 'Ошибка подключения';
        msg.className = 'msg error';
        msg.style.display = 'block';
    }
    return false;
}
</script>
</body>
</html>
