<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Personal Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { text-align: center; margin-bottom: 30px; }
        .logo .icon { font-size: 50px; }
        .logo h1 { font-size: 24px; color: #333; margin-top: 10px; }
        .logo p { color: #999; font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 18px; }

        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus { outline: none; border-color: #667eea; }
        input.error-input { border-color: #fc8181; }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }

        .links { text-align: center; margin-top: 20px; font-size: 13px; color: #999; }
        .links a { color: #667eea; text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }

        .alert {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        .alert.error { background: #fff0f0; border: 1px solid #ffcccc; color: #e53e3e; }
        .alert.success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }

        .strength { height: 4px; border-radius: 2px; margin-top: 6px; transition: all 0.3s; }
        .strength.weak { background: #fc8181; width: 33%; }
        .strength.medium { background: #f6ad55; width: 66%; }
        .strength.strong { background: #68d391; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="icon">🤖</div>
            <h1>Personal Assistant</h1>
            <p>Создайте аккаунт</p>
        </div>

        <div class="alert" id="alertMsg"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="username" placeholder="erasyl" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="strength" id="strength"></div>
            </div>
            <div class="form-group">
                <label>Подтвердите пароль</label>
                <input type="password" id="confirm" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>

        <div class="links">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </div>

    <script>
        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            const el = document.getElementById('strength');
            if (val.length === 0) { el.className = 'strength'; return; }
            if (val.length < 6) el.className = 'strength weak';
            else if (val.length < 10) el.className = 'strength medium';
            else el.className = 'strength strong';
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (password !== confirm) { showAlert('Пароли не совпадают', 'error'); return; }
            if (password.length < 6) { showAlert('Пароль должен быть не менее 6 символов', 'error'); return; }

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();
            if (data.error) {
                showAlert(data.error, 'error');
            } else {
                showAlert('Аккаунт создан! Перенаправляем...', 'success');
                setTimeout(() => window.location.href = '/login', 1500);
            }
        });

        function showAlert(msg, type) {
            const el = document.getElementById('alertMsg');
            el.textContent = msg;
            el.className = 'alert ' + type;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
