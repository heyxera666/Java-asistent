<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 15px 15px 0 0;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .time-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 10px;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            max-width: 80%;
            padding: 12px 15px;
            border-radius: 15px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-radius: 15px 5px 15px 15px;
        }

        .message.assistant .message-content {
            background: #e0e0e0;
            color: #333;
            border-radius: 5px 15px 15px 15px;
        }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .notes-toggle {
            background: #764ba2;
            padding: 10px 20px;
            margin: 10px;
            width: auto;
            margin-left: auto;
            margin-right: 10px;
        }

        .notes-panel {
            display: none;
            background: #f0f0f0;
            border-top: 1px solid #e0e0e0;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .notes-panel.active {
            display: block;
        }

        .notes-list {
            list-style: none;
        }

        .notes-list li {
            padding: 10px;
            background: white;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notes-list button {
            padding: 5px 10px;
            font-size: 12px;
            background: #ff6b6b;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: loading 1.4s infinite;
            margin: 0 2px;
        }

        @keyframes loading {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        .timer-display {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 10px 0;
        }

        .autocomplete-list {
            position: absolute;
            bottom: 60px;
            left: 15px;
            right: 15px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
            overflow: hidden;
            display: none;
        }

        .autocomplete-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
        }

        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover, .autocomplete-item.selected { background: #f0f0ff; }
        .autocomplete-item .hint { color: #999; font-size: 11px; }

        .mode-toggle {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            background: #f0f0f0;
            border-top: 1px solid #e0e0e0;
        }

        .mode-btn {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            background: #e0e0e0;
            color: #666;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .pomodoro-bar.break { background: linear-gradient(135deg, #26de81, #20bf6b); }
        .pomodoro-bar.active { display: block; }

        @media (max-width: 500px) {
            .container {
                max-height: 100vh;
                border-radius: 0;
            }

            .header h1 {
                font-size: 22px;
            }

            .message-content {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Personal Assistant</h1>
            <p>Ваш персональный помощник в браузере</p>
            <div class="time-display" id="timeDisplay">
                📅 Загрузка...
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="message-content">
                    👋 Привет! Я Personal Assistant. Введите команду или напишите <strong>help</strong> для списка команд.
                </div>
            </div>
        </div>

        <div class="notes-panel" id="notesPanel">
            <h3>📝 Заметки</h3>
            <ul class="notes-list" id="notesList"></ul>
            <button onclick="clearAllNotes()" style="width: 100%; margin-top: 10px; background: #ff6b6b;">Очистить все</button>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" id="cmdBtn" onclick="setMode('cmd')">⌨️ Команды</button>
            <button class="mode-btn" id="aiBtn" onclick="setMode('ai')">🤖 AI чат</button>
        </div>

        <div class="pomodoro-bar" id="pomodoroBar">🍅 25:00</div>

        <div class="input-area" style="position:relative;">
            <div class="autocomplete-list" id="autocompleteList"></div>
            <div class="input-group">
                <input type="text" id="inputField" placeholder="Введите команду... (Tab для подсказок)" autocomplete="off">
                <button onclick="sendCommand()">Отправить</button>
                <button class="notes-toggle" onclick="toggleNotesPanel()">📝</button>
            </div>
        </div>
    </div>

    <script>
        let isLoading = false;
        let timerInterval = null;
        let pomodoroInterval = null;
        let autocompleteIndex = -1;
        let currentMode = 'cmd'; // 'cmd' or 'ai'

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('cmdBtn').classList.toggle('active', mode === 'cmd');
            document.getElementById('aiBtn').classList.toggle('active', mode === 'ai');
            const input = document.getElementById('inputField');
            input.placeholder = mode === 'ai' ? 'Спросите что угодно у AI...' : 'Введите команду... (Tab для подсказок)';
            hideAutocomplete();
        }

        const COMMANDS = [
            { cmd: 'hello', hint: 'Приветствие' },
            { cmd: 'help', hint: 'Список команд' },
            { cmd: 'time', hint: 'Текущее время' },
            { cmd: 'date', hint: 'Текущая дата' },
            { cmd: 'weather ', hint: 'Погода в городе' },
            { cmd: 'note add ', hint: 'Добавить заметку' },
            { cmd: 'note list', hint: 'Показать заметки' },
            { cmd: 'note delete ', hint: 'Удалить заметку по номеру' },
            { cmd: 'note search ', hint: 'Поиск по заметкам' },
            { cmd: 'timer ', hint: 'Таймер в секундах' },
            { cmd: 'calc ', hint: 'Калькулятор (пример: calc 2+2*3)' },
            { cmd: 'convert ', hint: 'Конвертер (пример: convert 100 usd to eur)' },
            { cmd: 'pomodoro start', hint: 'Помодоро 25 мин' },
            { cmd: 'pomodoro break', hint: 'Перерыв 5 мин' },
            { cmd: 'pomodoro long break', hint: 'Длинный перерыв 15 мин' },
        ];

        // Обновлять время каждую секунду
        function updateClock() {
            const now = new Date();
            const days = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];
            const dayOfWeek = days[now.getDay() === 0 ? 6 : now.getDay() - 1];
            
            const dateStr = `${String(now.getDate()).padStart(2, '0')}.${String(now.getMonth() + 1).padStart(2, '0')}.${now.getFullYear()}`;
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            
            document.getElementById('timeDisplay').textContent = `📅 ${dateStr} (${dayOfWeek}) ⏰ ${timeStr}`;
        }

        // Инициализировать часы
        updateClock();
        setInterval(updateClock, 1000);

        // Автодополнение и навигация
        document.getElementById('inputField').addEventListener('keydown', function(e) {
            const list = document.getElementById('autocompleteList');
            const items = list.querySelectorAll('.autocomplete-item');

            if (e.key === 'Tab') {
                e.preventDefault();
                const val = this.value;
                if (items.length === 0) {
                    showAutocomplete(val);
                } else if (items.length === 1) {
                    this.value = items[0].dataset.cmd;
                    hideAutocomplete();
                } else if (autocompleteIndex >= 0) {
                    this.value = items[autocompleteIndex].dataset.cmd;
                    hideAutocomplete();
                } else {
                    autocompleteIndex = 0;
                    updateSelection(items);
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                autocompleteIndex = Math.min(autocompleteIndex + 1, items.length - 1);
                updateSelection(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                autocompleteIndex = Math.max(autocompleteIndex - 1, 0);
                updateSelection(items);
            } else if (e.key === 'Escape') {
                hideAutocomplete();
            } else if (e.key === 'Enter' && !isLoading) {
                if (autocompleteIndex >= 0 && items.length > 0) {
                    this.value = items[autocompleteIndex].dataset.cmd;
                    hideAutocomplete();
                } else {
                    sendCommand();
                }
            }
        });

        document.getElementById('inputField').addEventListener('input', function() {
            autocompleteIndex = -1;
            showAutocomplete(this.value);
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.input-area')) hideAutocomplete();
        });

        function showAutocomplete(val) {
            const list = document.getElementById('autocompleteList');
            if (!val) { hideAutocomplete(); return; }
            const matches = COMMANDS.filter(c => c.cmd.startsWith(val.toLowerCase()));
            if (matches.length === 0) { hideAutocomplete(); return; }
            list.innerHTML = matches.map(c =>
                `<div class="autocomplete-item" data-cmd="${c.cmd}" onclick="selectAutocomplete('${c.cmd}')">
                    <span>${c.cmd}</span><span class="hint">${c.hint}</span>
                </div>`
            ).join('');
            list.style.display = 'block';
        }

        function hideAutocomplete() {
            document.getElementById('autocompleteList').style.display = 'none';
            autocompleteIndex = -1;
        }

        function updateSelection(items) {
            items.forEach((el, i) => el.classList.toggle('selected', i === autocompleteIndex));
            if (autocompleteIndex >= 0) items[autocompleteIndex].scrollIntoView({ block: 'nearest' });
        }

        function selectAutocomplete(cmd) {
            document.getElementById('inputField').value = cmd;
            hideAutocomplete();
            document.getElementById('inputField').focus();
        }

        // Отправить команду
        async function sendCommand() {
            const input = document.getElementById('inputField').value.trim();
            
            if (!input || isLoading) return;

            isLoading = true;
            addMessage('user', input);
            document.getElementById('inputField').value = '';
            hideAutocomplete();

            if (currentMode === 'ai') {
                try {
                    const response = await fetch('/api/assistant/ai', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: input })
                    });
                    const data = await response.json();
                    addMessage('assistant', data.response);
                } catch (error) {
                    addMessage('assistant', '❌ Ошибка AI. Попробуйте еще раз.');
                } finally {
                    isLoading = false;
                }
                return;
            }

            try {
                const response = await fetch('/api/assistant/command', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ command: input })
                });

                const data = await response.json();
                addMessage('assistant', data.response);

                // Обновить список заметок
                if (input.toLowerCase().startsWith('note')) {
                    setTimeout(updateNotesList, 500);
                }

                // Обработать таймер
                if (input.toLowerCase().startsWith('timer')) {
                    handleTimer(input);
                }

                // Обработать помодоро
                if (data.response.startsWith('🍅 POMODORO:')) {
                    startPomodoro(25 * 60, false);
                } else if (data.response.startsWith('☕ BREAK:')) {
                    startPomodoro(5 * 60, true);
                } else if (data.response.startsWith('🛋️ LONGBREAK:')) {
                    startPomodoro(15 * 60, true);
                }

            } catch (error) {
                console.error('Ошибка:', error);
                addMessage('assistant', '❌ Ошибка при обработке команды. Попробуйте еще раз.');
            } finally {
                isLoading = false;
            }
        }

        // Добавить сообщение в чат
        function addMessage(sender, text) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + sender;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = text.replace(/\n/g, '<br>');
            
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            
            // Прокрутить вниз
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Показать/скрыть панель заметок
        function toggleNotesPanel() {
            const panel = document.getElementById('notesPanel');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                updateNotesList();
            }
        }

        // Обновить список заметок
        async function updateNotesList() {
            try {
                const response = await fetch('/api/assistant/notes');
                const data = await response.json();
                const notesList = document.getElementById('notesList');
                
                notesList.innerHTML = '';
                
                if (data.notes.length === 0) {
                    notesList.innerHTML = '<li style="text-align: center; color: #999;">Нет заметок</li>';
                } else {
                    data.notes.forEach((note, index) => {
                        const li = document.createElement('li');
                        li.innerHTML = `
                            <span>${note}</span>
                            <button onclick="deleteNote(${index + 1})">❌</button>
                        `;
                        notesList.appendChild(li);
                    });
                }
            } catch (error) {
                console.error('Ошибка при загрузке заметок:', error);
            }
        }

        // Удалить заметку
        function deleteNote(index) {
            sendCommand_Direct('note delete ' + index);
        }

        // Отправить команду напрямую
        async function sendCommand_Direct(command) {
            try {
                const response = await fetch('/api/assistant/command', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ command: command })
                });

                const data = await response.json();
                setTimeout(updateNotesList, 300);
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        // Очистить все заметки
        async function clearAllNotes() {
            if (confirm('Вы уверены? Все заметки будут удалены!')) {
                try {
                    await fetch('/api/assistant/notes', { method: 'DELETE' });
                    updateNotesList();
                    addMessage('assistant', '🗑️ Все заметки удалены.');
                } catch (error) {
                    console.error('Ошибка:', error);
                }
            }
        }

        // Обработать таймер
        function handleTimer(input) {
            const match = input.match(/timer\s+(\d+)/i);
            if (match) {
                const seconds = parseInt(match[1]);
                startTimer(seconds);
            }
        }

        // Помодоро
        function startPomodoro(totalSeconds, isBreak) {
            if (pomodoroInterval) clearInterval(pomodoroInterval);
            const bar = document.getElementById('pomodoroBar');
            bar.className = 'pomodoro-bar active' + (isBreak ? ' break' : '');
            let remaining = totalSeconds;

            function update() {
                const m = String(Math.floor(remaining / 60)).padStart(2, '0');
                const s = String(remaining % 60).padStart(2, '0');
                bar.textContent = (isBreak ? '☕ ' : '🍅 ') + m + ':' + s;
                if (remaining <= 0) {
                    clearInterval(pomodoroInterval);
                    bar.textContent = isBreak ? '☕ Перерыв окончен!' : '🍅 Помодоро завершено!';
                    playBeep();
                    setTimeout(() => { bar.className = 'pomodoro-bar'; }, 5000);
                }
                remaining--;
            }
            update();
            pomodoroInterval = setInterval(update, 1000);
        }

        // Запустить таймер
        function startTimer(seconds) {
            let remaining = seconds;
            
            // Добавить элемент таймера
            const chatArea = document.getElementById('chatArea');
            const timerDiv = document.createElement('div');
            timerDiv.id = 'timerDisplay';
            timerDiv.className = 'message assistant';
            timerDiv.innerHTML = '<div class="message-content"><div class="timer-display" id="timerCount">' + remaining + 's</div></div>';
            chatArea.appendChild(timerDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            // Обновлять каждую секунду
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                remaining--;
                document.getElementById('timerCount').textContent = remaining + 's';
                
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timerCount').textContent = '⏰ Время вышло!';
                    document.getElementById('timerCount').style.color = '#ff6b6b';
                    
                    // Звуковой сигнал
                    playBeep();
                }
            }, 1000);
        }

        // Воспроизвести звук
        function playBeep() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }
    </script>
</body>
</html>
