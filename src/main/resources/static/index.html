<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y. — AI Assistant</title>
    <link rel="stylesheet" href="/friday.css">
</head>
<body>
<div class="friday-app">
    <!-- HEADER -->
    <div class="hud-header">
        <div class="arc-reactor"></div>
        <div class="hud-title">
            <h1>F.R.I.D.A.Y.</h1>
            <div class="subtitle">Female Replacement Intelligent Digital Assistant Youth</div>
        </div>
        <div class="hud-clock">
            <div id="clockTime">--:--:--</div>
            <div class="clock-date" id="clockDate">--.--.----</div>
        </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <div class="status-item"><span class="status-dot"></span> AI Core</div>
        <div class="status-item"><span class="status-dot"></span> Voice Module</div>
        <div class="status-item"><span class="status-dot"></span> Database</div>
        <div class="status-item"><span class="status-dot" id="micStatus"></span> <span id="micLabel">Microphone</span></div>
    </div>

    <!-- POMODORO -->
    <div class="pomodoro-bar" id="pomodoroBar">🍅 25:00</div>

    <!-- CHAT -->
    <div class="chat-area" id="chatArea">
        <div class="msg friday">
            <div class="msg-header">
                <div class="msg-label">F.R.I.D.A.Y.</div>
                <div class="msg-time" id="initialTime">--:--</div>
            </div>
            <div class="msg-bubble">Здравствуйте, босс. Все системы активны и готовы к работе. Вы можете говорить голосом или печатать команды.</div>
        </div>
    </div>

    <!-- VOICE -->
    <div class="voice-section">
        <div class="voice-status" id="voiceStatus">ГОТОВА</div>
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Голосовое управление">🎙️</button>
        <div class="audio-viz" id="audioViz"></div>
    </div>

    <!-- MODE TABS -->
    <div class="mode-tabs">
        <button class="mode-tab active" id="tabCmd" onclick="setMode('cmd')">⌨ Команды</button>
        <button class="mode-tab" id="tabAi" onclick="setMode('ai')">🧠 AI Чат</button>
        <button class="mode-tab" onclick="clearChat()">🗑 Очистить</button>
    </div>

    <!-- INPUT -->
    <div class="input-section">
        <input type="text" id="inputField" placeholder="Введите команду или скажите голосом..." autocomplete="off">
        <button class="send-btn" onclick="sendCommand()" title="Отправить">▶</button>
    </div>
</div>

<script>
// === STATE ===
let currentMode = 'cmd';
let isLoading = false;
let recognition = null;
let isListening = false;
let synth = window.speechSynthesis;
let pomodoroInterval = null;
let timerInterval = null;
let selectedVoice = null;

// === CLOCK ===
function updateClock() {
    const now = new Date();
    const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    document.getElementById('clockTime').textContent =
        now.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('clockDate').textContent =
        days[now.getDay()] + ', ' + now.toLocaleDateString('ru-RU');
}
updateClock();
setInterval(updateClock, 1000);
document.getElementById('initialTime').textContent = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});

// === AUDIO VISUALIZER ===
(function initViz() {
    const viz = document.getElementById('audioViz');
    for (let i = 0; i < 20; i++) {
        const bar = document.createElement('div');
        bar.className = 'viz-bar';
        bar.style.height = '4px';
        viz.appendChild(bar);
    }
})();

function animateViz(active) {
    const bars = document.querySelectorAll('.viz-bar');
    if (active) {
        bars.forEach(b => {
            (function loop() {
                b.style.height = (4 + Math.random() * 30) + 'px';
                b._timer = setTimeout(loop, 80 + Math.random() * 80);
            })();
        });
    } else {
        bars.forEach(b => { clearTimeout(b._timer); b.style.height = '4px'; });
    }
}

// === VOICE RECOGNITION ===
function initRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { console.warn('Speech Recognition not supported'); return; }

    recognition = new SR();
    recognition.lang = 'ru-RU';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        document.getElementById('voiceBtn').classList.add('listening');
        document.getElementById('voiceStatus').textContent = 'СЛУШАЮ...';
        document.getElementById('voiceStatus').className = 'voice-status active';
        document.getElementById('micStatus').classList.remove('warn');
        animateViz(true);
    };

    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        document.getElementById('inputField').value = text;
        sendCommand();
    };

    recognition.onend = () => {
        isListening = false;
        document.getElementById('voiceBtn').classList.remove('listening');
        document.getElementById('voiceStatus').textContent = 'ГОТОВА';
        document.getElementById('voiceStatus').className = 'voice-status';
        animateViz(false);
    };

    recognition.onerror = (e) => {
        console.error('Speech error:', e.error);
        isListening = false;
        document.getElementById('voiceBtn').classList.remove('listening');
        if (e.error === 'not-allowed') {
            document.getElementById('voiceStatus').textContent = 'НЕТ ДОСТУПА К МИКРОФОНУ';
            document.getElementById('micStatus').classList.add('warn');
        } else {
            document.getElementById('voiceStatus').textContent = 'ОШИБКА';
        }
        document.getElementById('voiceStatus').className = 'voice-status';
        animateViz(false);
    };
}

function toggleVoice() {
    if (!recognition) initRecognition();
    if (!recognition) {
        addMessage('friday', 'Босс, ваш браузер не поддерживает голосовое управление. Используйте Chrome.');
        return;
    }
    if (isListening) {
        recognition.stop();
    } else {
        synth.cancel();
        recognition.start();
    }
}

// === TEXT-TO-SPEECH ===
function loadVoices() {
    const voices = synth.getVoices();
    // Prefer Russian female voice
    selectedVoice = voices.find(v => v.lang.startsWith('ru') && v.name.toLowerCase().includes('female')) ||
                    voices.find(v => v.lang.startsWith('ru') && v.name.toLowerCase().includes('milena')) ||
                    voices.find(v => v.lang.startsWith('ru') && v.name.toLowerCase().includes('irina')) ||
                    voices.find(v => v.lang.startsWith('ru')) ||
                    voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female')) ||
                    voices[0];
}

if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
    if (!text) return;
    synth.cancel();
    // Clean text for speech
    const clean = text.replace(/[•📋🎙️📝🔧🎭💡✅❌🍅☕🛋️⏰🌐🌡️🔄🧮💬😂🇷🇺]/g, '')
                      .replace(/\\n/g, '. ')
                      .replace(/<[^>]*>/g, '')
                      .replace(/\n/g, '. ')
                      .trim();
    if (!clean) return;

    const utter = new SpeechSynthesisUtterance(clean);
    utter.lang = 'ru-RU';
    utter.rate = 1.05;
    utter.pitch = 1.1;
    if (selectedVoice) utter.voice = selectedVoice;

    utter.onstart = () => {
        document.getElementById('voiceBtn').classList.add('speaking');
        document.getElementById('voiceStatus').textContent = 'ГОВОРЮ...';
        document.getElementById('voiceStatus').className = 'voice-status speaking';
        animateViz(true);
    };
    utter.onend = () => {
        document.getElementById('voiceBtn').classList.remove('speaking');
        document.getElementById('voiceStatus').textContent = 'ГОТОВА';
        document.getElementById('voiceStatus').className = 'voice-status';
        animateViz(false);
    };

    synth.speak(utter);
}

// === MODE ===
function setMode(mode) {
    currentMode = mode;
    document.getElementById('tabCmd').classList.toggle('active', mode === 'cmd');
    document.getElementById('tabAi').classList.toggle('active', mode === 'ai');
    document.getElementById('inputField').placeholder =
        mode === 'ai' ? 'Спросите AI что угодно...' : 'Введите команду или скажите голосом...';
    document.getElementById('chatArea').innerHTML = '';
    loadHistory();
}

// === SEND COMMAND ===
async function sendCommand() {
    const input = document.getElementById('inputField').value.trim();
    if (!input || isLoading) return;

    isLoading = true;
    addMessage('user', input);
    document.getElementById('inputField').value = '';

    const url = currentMode === 'ai' ? '/api/assistant/ai' : '/api/assistant/command';
    const body = currentMode === 'ai' ? { message: input } : { command: input };

    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            const errText = await res.text();
            throw new Error(`Ошибка сервера (${res.status}): ${errText}`);
        }
        const data = await res.json();
        const response = data.response || "Босс, возникла заминка в моих цепях. Не получила внятного ответа.";

        console.log("Response received:", response);
        if (response.includes('[TRIGGER_SELF_DESTRUCT]')) {
            const cleanMsg = response.replace('[TRIGGER_SELF_DESTRUCT]', '').trim();
            addMessage('friday', cleanMsg);
            speak(cleanMsg);
            startSelfDestruct();
        } else if (response.includes('[TRIGGER_SCAN]')) {
            const cleanMsg = response.replace('[TRIGGER_SCAN]', '').trim();
            startScanAnimation(() => {
                addMessage('friday', cleanMsg);
                speak(cleanMsg);
            });
        } else if (response.includes('[TRIGGER_GEOLOCATION]')) {
            const cleanMsg = response.replace('[TRIGGER_GEOLOCATION]', '').trim();
            startGeoAnimation(() => {
                addMessage('friday', cleanMsg);
                speak(cleanMsg);
            });
        } else if (response.includes('[TRIGGER_SYS_STATS]')) {
            const cleanMsg = response.replace('[TRIGGER_SYS_STATS]', '').trim();
            startStatsAnimation(() => {
                addMessage('friday', cleanMsg);
                speak(cleanMsg);
            });
        } else if (response.includes('[TRIGGER_MARS_PHOTO]')) {
            const parts = response.split('|||');
            const cleanMsg = parts[0].replace('[TRIGGER_MARS_PHOTO]', '').trim();
            const imgUrl = parts[1];
            startSpaceAnimation(() => {
                addMessage('friday', cleanMsg + `<br><div class='mars-photo-container'><img src='${imgUrl}' class='mars-photo'></div>`);
                speak(cleanMsg);
            });
        } else {
            addMessage('friday', response);
            speak(response);
        }

        // Handle timer
        if (input.toLowerCase().match(/^(timer|таймер)\s+\d+/)) {
            const secs = parseInt(input.replace(/\D/g, ''));
            if (secs > 0) startTimer(secs);
        }

        // Handle pomodoro
        if (response.startsWith('🍅 POMODORO:')) startPomodoro(25 * 60, false);
        else if (response.startsWith('☕ BREAK:')) startPomodoro(5 * 60, true);
        else if (response.startsWith('🛋️ LONGBREAK:')) startPomodoro(15 * 60, true);

    } catch (err) {
        addMessage('friday', 'Босс, ошибка связи: ' + err.message);
    } finally {
        isLoading = false;
    }
}

// === MESSAGES ===
function addMessage(sender, text, time) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg ' + (sender === 'user' ? 'user' : 'friday');

    // Create label and time container
    const header = document.createElement('div');
    header.className = 'msg-header';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = sender === 'user' ? 'БОСС' : 'F.R.I.D.A.Y.';

    const timeDiv = document.createElement('div');
    timeDiv.className = 'msg-time';
    
    if (time) {
        // Format ISO string from backend
        const date = new Date(time);
        timeDiv.textContent = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    } else {
        // New message
        const now = new Date();
        timeDiv.textContent = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    header.appendChild(label);
    header.appendChild(timeDiv);

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    const cleanText = text || "Босс, произошла системная ошибка при выводе сообщения.";
    bubble.innerHTML = cleanText.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');

    div.appendChild(header);
    div.appendChild(bubble);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
}

// === HISTORY ===
async function loadHistory() {
    try {
        const res = await fetch('/api/assistant/history?type=' + currentMode);
        const history = await res.json();
        history.forEach(h => addMessage(h.role === 'user' ? 'user' : 'friday', h.message, h.createdAt));
    } catch(e) {}
}
loadHistory();

// === CLEAR ===
async function clearChat() {
    try {
        await fetch('/api/assistant/history?type=' + currentMode, { method: 'DELETE' });
        document.getElementById('chatArea').innerHTML = '';
        addMessage('friday', 'История чата и база данных очищены, босс. Теперь всё чисто.');
    } catch(e) {
        document.getElementById('chatArea').innerHTML = '';
        addMessage('friday', 'Чат очищен локально, но произошла ошибка при удалении из базы.');
    }
}

// === TIMER ===
function startTimer(seconds) {
    let remaining = seconds;
    addMessage('friday', '<div class="timer-display" id="timerCount">' + remaining + 's</div>');
    
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        remaining--;
        const el = document.getElementById('timerCount');
        if (el) el.textContent = remaining + 's';
        if (remaining <= 0) {
            clearInterval(timerInterval);
            if (el) { el.textContent = 'Время вышло!'; el.style.color = '#ff4444'; }
            playBeep();
            speak('Босс, таймер завершён.');
        }
    }, 1000);
}

// === POMODORO ===
function startPomodoro(total, isBreak) {
    if (pomodoroInterval) clearInterval(pomodoroInterval);
    const bar = document.getElementById('pomodoroBar');
    bar.className = 'pomodoro-bar active' + (isBreak ? ' break' : '');
    let remaining = total;
    function update() {
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        bar.textContent = (isBreak ? '☕ ' : '🍅 ') + m + ':' + s;
        if (remaining <= 0) {
            clearInterval(pomodoroInterval);
            bar.textContent = isBreak ? '☕ Перерыв окончен!' : '🍅 Помодоро завершено!';
            playBeep();
            speak(isBreak ? 'Босс, перерыв окончен.' : 'Босс, помодоро завершено. Отличная работа.');
            setTimeout(() => { bar.className = 'pomodoro-bar'; }, 5000);
        }
        remaining--;
    }
    update();
    pomodoroInterval = setInterval(update, 1000);
}

// === BEEP ===
function playBeep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 600;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.8);
    } catch(e) {}
}

// === KEYBOARD ===
document.getElementById('inputField').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !isLoading) sendCommand();
});

// === INIT RECOGNITION ===
// === SELF DESTRUCT ===
function startSelfDestruct() {
    const app = document.querySelector('.friday-app');
    const statusItems = document.querySelectorAll('.status-dot');
    
    // Phase 1: Alert
    app.classList.add('self-destruct-active');
    statusItems.forEach(dot => { dot.style.background = '#ff0000'; dot.style.boxShadow = '0 0 10px #ff0000'; });
    
    let count = 5;
    const cdDiv = document.createElement('div');
    cdDiv.className = 'destruct-overlay';
    document.body.appendChild(cdDiv);

    const timer = setInterval(() => {
        if (count > 0) {
            cdDiv.innerHTML = `<div class="destruct-num">${count}</div><div class="destruct-label">SYSTEM PURGE IN PROGRESS</div>`;
            playBeepHigh();
            count--;
        } else {
            clearInterval(timer);
            // Phase 2: Total Failure
            cdDiv.innerHTML = `<div class="destruct-final">SYSTEM OFFLINE</div>`;
            app.style.filter = 'brightness(0) blur(20px)';
            app.style.transform = 'scale(0.8)';
            app.style.opacity = '0';
            document.body.style.background = '#000';
            playExplosion();
            
            setTimeout(() => {
                location.reload(); // Re-boot after 5 seconds
            }, 5000);
        }
    }, 1000);
}

function playBeepHigh() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 800; osc.type = 'square';
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
}

function playExplosion() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(100, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + 2);
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 2);
        osc.start(); osc.stop(ctx.currentTime + 2);
    } catch(e) {}
}

// === SCAN ANIMATION ===
function startScanAnimation(callback) {
    const overlay = document.createElement('div');
    overlay.className = 'scan-overlay';
    overlay.innerHTML = `
        <div class="scan-line"></div>
        <div class="scan-text">INITIALIZING DEEP SCAN...</div>
        <div class="scan-files" id="scanFiles"></div>
    `;
    document.body.appendChild(overlay);
    
    const files = ['AssistantService.java', 'AssistantController.java', 'SecurityConfig.java', 'PersonalAssistant.java', 'pom.xml', 'application.properties', 'friday.css', 'index.html'];
    const filesDiv = document.getElementById('scanFiles');
    
    let i = 0;
    const interval = setInterval(() => {
        const f = document.createElement('div');
        f.textContent = '> SCANNING: ' + files[Math.floor(Math.random() * files.length)];
        filesDiv.prepend(f);
        if (filesDiv.children.length > 10) filesDiv.lastChild.remove();
        i++;
        if (i > 20) {
            clearInterval(interval);
            overlay.innerHTML = '<div class="scan-text success">SCAN COMPLETE. DATA DECRYPTED.</div>';
            setTimeout(() => {
                overlay.remove();
                callback();
            }, 1000);
        }
    }, 100);
}

// === GEO ANIMATION ===
function startGeoAnimation(callback) {
    const overlay = document.createElement('div');
    overlay.className = 'geo-overlay';
    overlay.innerHTML = `
        <div class="radar">
            <div class="radar-line"></div>
            <div class="radar-circle"></div>
            <div class="radar-circle"></div>
            <div class="radar-circle"></div>
        </div>
        <div class="geo-text">UPLINKING TO SATELLITE...</div>
        <div class="geo-status">ENCRYPTED SIGNAL DETECTED</div>
    `;
    document.body.appendChild(overlay);
    
    setTimeout(() => {
        overlay.innerHTML = '<div class="geo-text success">LOCATION LOCKED.</div>';
        setTimeout(() => {
            overlay.remove();
            callback();
        }, 1000);
    }, 2500);
}

// === STATS ANIMATION ===
function startStatsAnimation(callback) {
    const overlay = document.createElement('div');
    overlay.className = 'stats-overlay';
    overlay.innerHTML = `
        <div class="stats-hud">
            <div class="stats-title">CORE SYSTEM DIAGNOSTICS</div>
            <div class="stat-row">
                <div class="stat-label">CPU CORE LOAD</div>
                <div class="stat-bar"><div class="stat-fill" style="width: 45%"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-label">MEMORY USAGE</div>
                <div class="stat-bar"><div class="stat-fill" style="width: 62%"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-label">NET UPLINK</div>
                <div class="stat-bar"><div class="stat-fill" style="width: 88%"></div></div>
            </div>
            <div class="stats-status">ALL SYSTEMS OPTIMAL</div>
        </div>
    `;
    document.body.appendChild(overlay);
    
    setTimeout(() => {
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.remove();
            callback();
        }, 500);
    }, 3000);
}

// === SPACE ANIMATION ===
function startSpaceAnimation(callback) {
    const overlay = document.createElement('div');
    overlay.className = 'space-overlay';
    overlay.innerHTML = `
        <div class="stars"></div>
        <div class="nebula"></div>
        <div class="space-text">ESTABLISHING INTERPLANETARY UPLINK...</div>
        <div class="space-status">RECEIVING NASA DATA PACKETS</div>
    `;
    document.body.appendChild(overlay);
    
    setTimeout(() => {
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.remove();
            callback();
        }, 500);
    }, 2000);
}

initRecognition();
</script>
</body>
</html>
