<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y. — AI Assistant</title>
    <link rel="stylesheet" href="/friday.css">
</head>
<body>
<div class="friday-app">
    <!-- HEADER -->
    <div class="hud-header">
        <div class="arc-reactor"></div>
        <div class="hud-title">
            <h1>F.R.I.D.A.Y.</h1>
            <div class="subtitle">Female Replacement Intelligent Digital Assistant Youth</div>
        </div>
        <div class="hud-clock">
            <div id="clockTime">--:--:--</div>
            <div class="clock-date" id="clockDate">--.--.----</div>
        </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <div class="status-item"><span class="status-dot"></span> AI Core</div>
        <div class="status-item"><span class="status-dot"></span> Voice Module</div>
        <div class="status-item"><span class="status-dot"></span> Database</div>
        <div class="status-item"><span class="status-dot" id="micStatus"></span> <span id="micLabel">Microphone</span></div>
    </div>

    <!-- POMODORO -->
    <div class="pomodoro-bar" id="pomodoroBar">🍅 25:00</div>

    <!-- CHAT -->
    <div class="chat-area" id="chatArea">
        <div class="msg friday">
            <div class="msg-label">F.R.I.D.A.Y.</div>
            <div class="msg-bubble">Здравствуйте, босс. Все системы активны и готовы к работе. Вы можете говорить голосом или печатать команды.</div>
        </div>
    </div>

    <!-- VOICE -->
    <div class="voice-section">
        <div class="voice-status" id="voiceStatus">ГОТОВА</div>
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Голосовое управление">🎙️</button>
        <div class="audio-viz" id="audioViz"></div>
    </div>

    <!-- MODE TABS -->
    <div class="mode-tabs">
        <button class="mode-tab active" id="tabCmd" onclick="setMode('cmd')">⌨ Команды</button>
        <button class="mode-tab" id="tabAi" onclick="setMode('ai')">🧠 AI Чат</button>
        <button class="mode-tab" onclick="clearChat()">🗑 Очистить</button>
    </div>

    <!-- INPUT -->
    <div class="input-section">
        <input type="text" id="inputField" placeholder="Введите команду или скажите голосом..." autocomplete="off">
        <button class="send-btn" onclick="sendCommand()" title="Отправить">▶</button>
    </div>
</div>

<script>
// === STATE ===
let currentMode = 'cmd';
let isLoading = false;
let recognition = null;
let isListening = false;
let synth = window.speechSynthesis;
let pomodoroInterval = null;
let timerInterval = null;
let selectedVoice = null;

// === CLOCK ===
function updateClock() {
    const now = new Date();
    const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    document.getElementById('clockTime').textContent =
        now.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('clockDate').textContent =
        days[now.getDay()] + ', ' + now.toLocaleDateString('ru-RU');
}
updateClock();
setInterval(updateClock, 1000);

// === AUDIO VISUALIZER ===
(function initViz() {
    const viz = document.getElementById('audioViz');
    for (let i = 0; i < 20; i++) {
        const bar = document.createElement('div');
        bar.className = 'viz-bar';
        bar.style.height = '4px';
        viz.appendChild(bar);
    }
})();

function animateViz(active) {
    const bars = document.querySelectorAll('.viz-bar');
    if (active) {
        bars.forEach(b => {
            (function loop() {
                b.style.height = (4 + Math.random() * 30) + 'px';
                b._timer = setTimeout(loop, 80 + Math.random() * 80);
            })();
        });
    } else {
        bars.forEach(b => { clearTimeout(b._timer); b.style.height = '4px'; });
    }
}

// === VOICE RECOGNITION ===
function initRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { console.warn('Speech Recognition not supported'); return; }

    recognition = new SR();
    recognition.lang = 'ru-RU';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        document.getElementById('voiceBtn').classList.add('listening');
        document.getElementById('voiceStatus').textContent = 'СЛУШАЮ...';
        document.getElementById('voiceStatus').className = 'voice-status active';
        document.getElementById('micStatus').classList.remove('warn');
        animateViz(true);
    };

    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        document.getElementById('inputField').value = text;
        sendCommand();
    };

    recognition.onend = () => {
        isListening = false;
        document.getElementById('voiceBtn').classList.remove('listening');
        document.getElementById('voiceStatus').textContent = 'ГОТОВА';
        document.getElementById('voiceStatus').className = 'voice-status';
        animateViz(false);
    };

    recognition.onerror = (e) => {
        console.error('Speech error:', e.error);
        isListening = false;
        document.getElementById('voiceBtn').classList.remove('listening');
        if (e.error === 'not-allowed') {
            document.getElementById('voiceStatus').textContent = 'НЕТ ДОСТУПА К МИКРОФОНУ';
            document.getElementById('micStatus').classList.add('warn');
        } else {
            document.getElementById('voiceStatus').textContent = 'ОШИБКА';
        }
        document.getElementById('voiceStatus').className = 'voice-status';
        animateViz(false);
    };
}

function toggleVoice() {
    if (!recognition) initRecognition();
    if (!recognition) {
        addMessage('friday', 'Босс, ваш браузер не поддерживает голосовое управление. Используйте Chrome.');
        return;
    }
    if (isListening) {
        recognition.stop();
    } else {
        synth.cancel();
        recognition.start();
    }
}

// === TEXT-TO-SPEECH ===
function loadVoices() {
    const voices = synth.getVoices();
    // Prefer Russian female voice
    selectedVoice = voices.find(v => v.lang.startsWith('ru') && v.name.toLowerCase().includes('female')) ||
                    voices.find(v => v.lang.startsWith('ru') && v.name.toLowerCase().includes('milena')) ||
                    voices.find(v => v.lang.startsWith('ru') && v.name.toLowerCase().includes('irina')) ||
                    voices.find(v => v.lang.startsWith('ru')) ||
                    voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female')) ||
                    voices[0];
}

if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
    if (!text) return;
    synth.cancel();
    // Clean text for speech
    const clean = text.replace(/[•📋🎙️📝🔧🎭💡✅❌🍅☕🛋️⏰🌐🌡️🔄🧮💬😂🇷🇺]/g, '')
                      .replace(/\\n/g, '. ')
                      .replace(/<[^>]*>/g, '')
                      .replace(/\n/g, '. ')
                      .trim();
    if (!clean) return;

    const utter = new SpeechSynthesisUtterance(clean);
    utter.lang = 'ru-RU';
    utter.rate = 1.05;
    utter.pitch = 1.1;
    if (selectedVoice) utter.voice = selectedVoice;

    utter.onstart = () => {
        document.getElementById('voiceBtn').classList.add('speaking');
        document.getElementById('voiceStatus').textContent = 'ГОВОРЮ...';
        document.getElementById('voiceStatus').className = 'voice-status speaking';
        animateViz(true);
    };
    utter.onend = () => {
        document.getElementById('voiceBtn').classList.remove('speaking');
        document.getElementById('voiceStatus').textContent = 'ГОТОВА';
        document.getElementById('voiceStatus').className = 'voice-status';
        animateViz(false);
    };

    synth.speak(utter);
}

// === MODE ===
function setMode(mode) {
    currentMode = mode;
    document.getElementById('tabCmd').classList.toggle('active', mode === 'cmd');
    document.getElementById('tabAi').classList.toggle('active', mode === 'ai');
    document.getElementById('inputField').placeholder =
        mode === 'ai' ? 'Спросите AI что угодно...' : 'Введите команду или скажите голосом...';
    document.getElementById('chatArea').innerHTML = '';
    loadHistory();
}

// === SEND COMMAND ===
async function sendCommand() {
    const input = document.getElementById('inputField').value.trim();
    if (!input || isLoading) return;

    isLoading = true;
    addMessage('user', input);
    document.getElementById('inputField').value = '';

    const url = currentMode === 'ai' ? '/api/assistant/ai' : '/api/assistant/command';
    const body = currentMode === 'ai' ? { message: input } : { command: input };

    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            const errText = await res.text();
            throw new Error(`Ошибка сервера (${res.status}): ${errText}`);
        }
        const data = await res.json();
        const response = data.response || "Босс, возникла заминка в моих цепях. Не получила внятного ответа.";

        addMessage('friday', response);
        speak(response);

        // Handle timer
        if (input.toLowerCase().match(/^(timer|таймер)\s+\d+/)) {
            const secs = parseInt(input.replace(/\D/g, ''));
            if (secs > 0) startTimer(secs);
        }

        // Handle pomodoro
        if (response.startsWith('🍅 POMODORO:')) startPomodoro(25 * 60, false);
        else if (response.startsWith('☕ BREAK:')) startPomodoro(5 * 60, true);
        else if (response.startsWith('🛋️ LONGBREAK:')) startPomodoro(15 * 60, true);

    } catch (err) {
        addMessage('friday', 'Босс, ошибка связи: ' + err.message);
    } finally {
        isLoading = false;
    }
}

// === MESSAGES ===
function addMessage(sender, text) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg ' + (sender === 'user' ? 'user' : 'friday');

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = sender === 'user' ? 'БОСС' : 'F.R.I.D.A.Y.';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    const cleanText = text || "Босс, произошла системная ошибка при выводе сообщения.";
    bubble.innerHTML = cleanText.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');

    div.appendChild(label);
    div.appendChild(bubble);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
}

// === HISTORY ===
async function loadHistory() {
    try {
        const res = await fetch('/api/assistant/history?type=' + currentMode);
        const history = await res.json();
        history.forEach(h => addMessage(h.role === 'user' ? 'user' : 'friday', h.message));
    } catch(e) {}
}
loadHistory();

// === CLEAR ===
function clearChat() {
    document.getElementById('chatArea').innerHTML = '';
    addMessage('friday', 'Чат очищен, босс. Чем могу помочь?');
}

// === TIMER ===
function startTimer(seconds) {
    let remaining = seconds;
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg friday';
    div.innerHTML = '<div class="msg-label">F.R.I.D.A.Y.</div><div class="msg-bubble"><div class="timer-display" id="timerCount">' + remaining + 's</div></div>';
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        remaining--;
        const el = document.getElementById('timerCount');
        if (el) el.textContent = remaining + 's';
        if (remaining <= 0) {
            clearInterval(timerInterval);
            if (el) { el.textContent = 'Время вышло!'; el.style.color = '#ff4444'; }
            playBeep();
            speak('Босс, таймер завершён.');
        }
    }, 1000);
}

// === POMODORO ===
function startPomodoro(total, isBreak) {
    if (pomodoroInterval) clearInterval(pomodoroInterval);
    const bar = document.getElementById('pomodoroBar');
    bar.className = 'pomodoro-bar active' + (isBreak ? ' break' : '');
    let remaining = total;
    function update() {
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        bar.textContent = (isBreak ? '☕ ' : '🍅 ') + m + ':' + s;
        if (remaining <= 0) {
            clearInterval(pomodoroInterval);
            bar.textContent = isBreak ? '☕ Перерыв окончен!' : '🍅 Помодоро завершено!';
            playBeep();
            speak(isBreak ? 'Босс, перерыв окончен.' : 'Босс, помодоро завершено. Отличная работа.');
            setTimeout(() => { bar.className = 'pomodoro-bar'; }, 5000);
        }
        remaining--;
    }
    update();
    pomodoroInterval = setInterval(update, 1000);
}

// === BEEP ===
function playBeep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 600;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.8);
    } catch(e) {}
}

// === KEYBOARD ===
document.getElementById('inputField').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !isLoading) sendCommand();
});

// === INIT RECOGNITION ===
initRecognition();
</script>
</body>
</html>
