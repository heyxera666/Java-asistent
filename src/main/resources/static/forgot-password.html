<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Забыли пароль — Personal Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { text-align: center; margin-bottom: 30px; }
        .logo .icon { font-size: 50px; }
        .logo h1 { font-size: 24px; color: #333; margin-top: 10px; }
        .logo p { color: #999; font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus { outline: none; border-color: #667eea; }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }

        .links { text-align: center; margin-top: 20px; font-size: 13px; color: #999; }
        .links a { color: #667eea; text-decoration: none; font-weight: 600; }

        .alert {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        .alert.error { background: #fff0f0; border: 1px solid #ffcccc; color: #e53e3e; }
        .alert.success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }

        .hint {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #667eea;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="icon">🔑</div>
            <h1>Забыли пароль?</h1>
            <p>Введите email для сброса пароля</p>
        </div>

        <div class="hint">
            💡 Мы отправим инструкции по сбросу пароля на ваш email
        </div>

        <div class="alert" id="alertMsg"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn">Отправить инструкции</button>
        </form>

        <div class="links">
            <a href="/login">← Вернуться к входу</a>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();

            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            showAlert('Если этот email зарегистрирован, инструкции отправлены ✉️', 'success');
        });

        function showAlert(msg, type) {
            const el = document.getElementById('alertMsg');
            el.textContent = msg;
            el.className = 'alert ' + type;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
