server.port=8080

# Local fallback database
spring.datasource.url=jdbc:h2:file:./data/personal-assistant;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Supabase/PostgreSQL example
# spring.datasource.url=jdbc:postgresql://aws-0-region.pooler.supabase.com:6543/postgres
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres.project-ref
# spring.datasource.password=your-database-password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${GROQ_API_KEY:}
groq.model=llama-3.1-8b-instant
